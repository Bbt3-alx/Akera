paths:
  "/api/v1/dashboard":
    get:
      summary: Get dashboard data
      tags: [Dashboard]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard data.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  "/api/v1/receipts/verify/{receiptNumber}":
    get:
      summary: Verify a receipt by receipt number
      tags: [Receipts]
      security: []
      parameters:
        - name: receiptNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Receipt verification result.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  "/api/v1/company/branding":
    get:
      summary: Get active company branding
      tags: [Branding]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyIdHeader"
      responses:
        "200":
          description: Company branding.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  branding:
                    $ref: "#/components/schemas/CompanyBranding"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"
    put:
      summary: Update active company branding
      tags: [Branding]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyBranding"
      responses:
        "200":
          description: Company branding updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  "/api/v1/security/transaction-pin/status":
    get:
      summary: Get current user's transaction PIN status
      tags: [Security]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyIdHeader"
      responses:
        "200":
          description: Transaction PIN status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      configured:
                        type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  "/api/v1/security/transaction-pin/setup":
    post:
      summary: Configure the current manager's transaction PIN
      tags: [Security]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transactionPin, currentPassword]
              properties:
                transactionPin:
                  type: string
                  format: password
                  pattern: "^\\d{6}$"
                currentPassword:
                  type: string
                  format: password
      responses:
        "200":
          description: Transaction PIN configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"

  "/api/v1/security/transaction-pin/change":
    patch:
      summary: Change the current manager's transaction PIN
      tags: [Security]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentTransactionPin, newTransactionPin, currentPassword]
              properties:
                currentTransactionPin:
                  type: string
                  format: password
                  pattern: "^\\d{6}$"
                newTransactionPin:
                  type: string
                  format: password
                  pattern: "^\\d{6}$"
                currentPassword:
                  type: string
                  format: password
      responses:
        "200":
          description: Transaction PIN changed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"

  "/api/v1/security/setup-transaction-pin":
    post:
      summary: Legacy alias for transaction PIN setup
      tags: [Security]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transactionPin, currentPassword]
              properties:
                transactionPin:
                  type: string
                  format: password
                  pattern: "^\\d{6}$"
                currentPassword:
                  type: string
                  format: password
      responses:
        "200":
          description: Transaction PIN configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"

  "/api/v1/users/admin":
    get:
      summary: Legacy admin role check
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Plain text role-check response.
  "/api/v1/users/manager":
    get:
      summary: Legacy manager role check
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Plain text role-check response.
  "/api/v1/users/user":
    get:
      summary: Legacy user role check
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Plain text role-check response.
  "/api/v1/users/partner":
    get:
      summary: Legacy partner role check
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Plain text role-check response.
