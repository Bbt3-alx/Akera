paths:
  "/api/v1/payments/new":
    post:
      summary: Create a payment
      tags: [Payments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                method:
                  type: string
                partnerId:
                  type: string
                description:
                  type: string
                totalAmount:
                  type: number
      responses:
        "201":
          description: Payment created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  payment:
                    $ref: "#/components/schemas/Payment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  "/api/v1/payments/operations/{operationId}/pay":
    post:
      summary: Pay for a buy operation
      tags: [Payments]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OperationIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
                method:
                  type: string
                partnerId:
                  type: string
      responses:
        "200":
          description: Operation payment processed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  payment:
                    $ref: "#/components/schemas/Payment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  "/api/v1/payments/{paymentId}/receipt":
    post:
      summary: Generate a receipt for a payment
      tags: [Payments]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PaymentIdPath"
      responses:
        "200":
          description: Receipt generated.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  "/api/v1/payments":
    get:
      summary: List payment histories
      tags: [Payments]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Payment history list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  payments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Payment"
        "500":
          $ref: "#/components/responses/ServerError"

  "/api/v1/payments/{paymentId}":
    get:
      summary: Get a payment
      tags: [Payments]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PaymentIdPath"
      responses:
        "200":
          description: Payment details.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  payment:
                    $ref: "#/components/schemas/Payment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  "/api/v1/payments/operation/{operationId}":
    get:
      summary: List payments for an operation
      tags: [Payments]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OperationIdPath"
      responses:
        "200":
          description: Operation payment list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  payments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Payment"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  "/api/v1/payments/edit/{paymentId}":
    put:
      summary: Update a payment
      tags: [Payments]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PaymentIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Payment"
      responses:
        "200":
          description: Payment updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  "/api/v1/payments/cancel/{paymentId}":
    delete:
      summary: Cancel a payment
      tags: [Payments]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PaymentIdPath"
      responses:
        "200":
          description: Payment cancelled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"
