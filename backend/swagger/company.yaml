paths:
  "/api/v1/companies":
    post:
      summary: Create a company
      tags: [Companies]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, address, contact, baseCurrency]
              properties:
                name:
                  type: string
                address:
                  type: string
                contact:
                  type: string
                baseCurrency:
                  type: string
                  enum: [FCFA, GNF]
      responses:
        "201":
          description: Company created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  code:
                    type: integer
                    example: 201
                  data:
                    type: object
                    additionalProperties: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"
    get:
      summary: Legacy company route disabled
      description: Legacy company listing is disabled. Use membership-context company endpoints instead.
      tags: [Companies]
      security:
        - bearerAuth: []
      responses:
        "410":
          description: Legacy company route disabled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  code:
                    type: integer
                    example: 410
                  message:
                    type: string
                    example: Legacy company route disabled. Use membership-context company endpoints instead.

  "/api/v1/companies/{id}":
